name: CI/CD

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  ci:
    name: Build and Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (non-blocking)
        run: npm run lint --if-present

      - name: Build
        run: npm run build
